<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/choosequiz.css">
    <script src="../js/choosequiz.js" defer></script>
    <title>Choose Difficulty</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="content">
                <div class="levels">
                    <div class="level">
                        <h2>Easy</h2>
                        
                        <h3>Topic: Broad knowledge</h3>

                        <img src="../images/Star_rating_1_of_5.png" alt="1 of 5 stars" class="starsImg">

                        <span>Max xp: 65</span>

                        <div class="wrapper">
                            <img src="../images/moneyIcon.png" alt="moneyIcon">
                            <span>10</span>
                        </div>

                        <img src="../images/EasyLevelmg.jpg" alt="Books">

                        <button id="EasyLvl">Play</button>

                    </div>

                    <div class="level">
                        <h2>Medium</h2>
                        
                        <h3>Topic: Broad knowledge</h3>

                        <img src="../images/Star_rating_2_of_5.png" alt="1 of 5 stars" class="starsImg">

                        <span>Max xp: 105</span>

                        <div class="wrapper">
                            <img src="../images/moneyIcon.png" alt="moneyIcon">
                            <span>30</span>
                        </div>

                        <img src="../images/MeduimLevelImg.jpg" alt="Books">

                        <button id="MeduimLvl">Play</button>
                    </div>

                    <div class="level">
                        <h2>Hard</h2>
                        
                        <h3>Topic: Broad knowledge</h3>

                        <img src="../images/Star_rating_3_of_5.png" alt="1 of 5 stars" class="starsImg">

                        <span>Max xp: 420</span>

                        <div class="wrapper">
                            <img src="../images/moneyIcon.png" alt="moneyIcon">
                            <span>50</span>
                        </div>

                        <img src="../images/HardLvlImg.jpg" alt="Books" id="extraHeight">

                        <button id="HardLvl">Play</button>
                    </div>

                </div>
            </div>
        </div>
    </main>
</body>
</html>
