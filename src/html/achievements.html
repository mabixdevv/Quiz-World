<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/achievements.css">
    <script src="" defer></script>
    <title>Achievements</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="content">
                <div class="achievement">
                    <div class="info">
                        <div class="wrapper">
                            <img src="../images/WelcomeBadge.png" alt="Icon">
                            <h2>Welcome!</h2>
                        </div>
                       
                        <span>Welcome to the game!</span>
                    </div>

                    <button>Equip</button>
                </div>

                <div class="achievement">
                    <div class="info">
                        <div class="wrapper">
                            <img src="../images/TooEasyBadge.png" alt="Icon">
                            <h2>Too easy!</h2>
                        </div>
                      
                        <span>Beat easy quiz.</span>
                    </div>

                    <button>Locked</button>
                </div>

                <div class="achievement">
                    <div class="info">
                        <div class="wrapper">
                            <img src="../images/JustStartingBadge.png" alt="Icon">
                            <h2>Just starting!</h2>
                        </div>
                
                        <span>Beat medium quiz.</span>
                    </div>

                    <button>Locked</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
