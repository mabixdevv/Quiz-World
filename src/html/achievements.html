<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/achievements.css">
    <script src="../js/achievements.js" defer></script>
    <title>Achievements</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="content">
                <button>Back</button>

                <div class="achievemetns">
                    <div class="achievement">

                        <div class="info">
                            <div class="wrapper">
                                <img src="../images/WelcomeBadge.png" alt="Icon">
                                <h2>Welcome!</h2>
                            </div>
                        
                            <span>Welcome to the game!</span>
                        </div>

                        <button id="B1">Equip</button>

                    </div>

                    <div class="achievement">

                        <div class="info">
                            <div class="wrapper">
                                <img src="../images/TooEasyBadge.png" alt="Icon">
                                <h2>Too easy!</h2>
                            </div>
                        
                            <span>Beat easy quiz.</span>
                        </div>

                        <button id="B2">Equip</button>

                    </div>

                    <div class="achievement">

                        <div class="info">
                            <div class="wrapper">
                                <img src="../images/JustStartingBadge.png" alt="Icon">
                                <h2>Just starting!</h2>
                            </div>
                    
                            <span>Beat medium quiz.</span>
                        </div>

                        <button id="B3">Equip</button>

                    </div>

                    <div class="achievement">

                        <div class="info">
                            <div class="wrapper">
                                <img src="../images/JustStartingBadge.png" alt="Icon">
                                <h2>Challenge Accepted</h2>
                            </div>
                    
                            <span>Beat hard quiz.</span>
                        </div>

                        <button id="B4">Locked</button>

                    </div>

                    <div class="achievement">

                        <div class="info">
                            <div class="wrapper">
                                <img src="../images/JustStartingBadge.png" alt="Icon">
                                <h2>Got em all!</h2>
                            </div>
                    
                            <span>Get every badge(Impressive)</span>
                        </div>

                        <button id="B5">Locked</button>

                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
