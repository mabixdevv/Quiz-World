<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/main.js" defer></script>
    <title>Quiz World</title>
</head>
<body>
    <main>
        <div class="container">
            <div class="content">
                <div class="upperPart">
                    <div class="profile">
                        <div class="profileInfo">
                            <input type="file" id="pfp_upload" hidden>
                            <label for="pfp_upload"><img src="../images/NoPfp.jpg" alt="Pfp"></label>   

                            <div class="wrapper">
                                <h3>Player Name</h3>
                                <img src="../images/EditName.png" alt="Edit">
                            </div>
                            
                        </div>
        
                        <div class="profileChar">
                            <span>Level: 1</span>
                            <div class="xpbar">
                                <div class="bar"></div>
                                <span>XP: N/A%</span>
                            </div>
                        </div>
                    </div>

                    <div class="titles">
                        <h1>Quiz World</h1>

                        <h2>Test your knowledge!</h2>
                    </div>

                </div>

                <div class="wrapper3">
                    <img src="../images/moneyIcon.png" alt="Money" id="moneyIcon">
                    <span id="moneyTxt">N/A</span>
                </div>

                <div class="buttons">
                    <button>Play</button>
                    <button>Achievements</button>
                </div>
                
            </div>
        </div>
    </main>
</body>
</html>
